server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Redirect legacy sitemap path to the Astro-generated one
    location = /sitemap.xml { return 301 /sitemap-index.xml; }
    location = /sitemap_index.xml { return 301 /sitemap-index.xml; }

    # Astro builds directory-style pages: /path/index.html (served at /path)
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    error_page 404 /404.html;

    # Hashed, immutable build assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
